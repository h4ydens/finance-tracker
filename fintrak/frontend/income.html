<!DOCTYPE html>
<meta charset="UTF8">
<html lang="en">
    <head>
        <title>Fintrak - Income</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav>
            <span class="logo">Fintrak</span>
            <a href="dashboard.html">Dashboard</a>
            <a href="expenses.html">Expenses</a>
            <a href="income.html" class="active">Income</a>
        </nav>

        <!--page its all wrapped in-->
        <div class="page">
            <div class="page-title" id="user-name">INVALID USER's Income</div>
            <div class="page-subtitle">Track and manage your income</div>

            <!--Grid for the cards with info on them etc-->
            <div class="grid-2">
                <div class="card">
                    <div class="card-title">Add Income</div>
                    <!--Ammount-->
                    <div class="form-group">
                        <label>Amount</label>
                        <input type="number" id="amount" placeholder="$0.00">
                    </div>
                    <!--Date Recived-->
                    <div class="form-group">
                        <label>Date Recived</label>
                        <input type="date" id="date_received">
                    </div>
                    <!--Description-->
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="description" placeholder="e.g. Casino Operations">
                    </div>
                     <div id="error-msg" style="display:none; color:#e07070; font-size:13px; margin-bottom:12px;"></div>
                    <div class="btn btn-primary" onclick="addIncome()">Add Income</div>
                </div>
                <!--SUMMARY-->
                <div class="card">
                    <div class="card-title">This Month</div>
                    <div class="placeholder-block short" id="this-month">Loading...</div>
                </div>
            </div>
            <!--Figure out a way to make each incomeid a diff row of data in a table-->
            <div class="card">
                <div class="card-title">All Income</div>
                <div id="income-table">Loading...</div>

            </div>
        </div>
        <!-- stuff for adding income and viewing income of the user-->
        <script>
            //need token for all pages, if not redirect to login
            const token = localStorage.getItem("token")
            
            if (!token) {
                window.location.href = "login.html"
            }
            //replace with current users name
            const username = localStorage.getItem("username")
            document.getElementById("user-name").textContent = username + "'s Income"

            //need 2 functions loadIncome and addincome

            //Load Income
            //doesnt have way to remove yet need to add
            //need to add monthly recap somehow
            function loadIncome() {
                fetch("/income", {
                    headers: { "Authorization": `Bearer ${token}` }
                })
                .then(r => r.json())
                .then(data => {
                    const container = document.getElementById("income-table")

                    if (data.length === 0) {
                        container.textContent = "No income yet"
                        return
                    }
                    //dont like how this is hard coded visuals but not sure atm
                    container.innerHTML = `
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; padding:8px 0; border-bottom:1px solid var(--border); margin-bottom:4px;">
                            <span style="color:var(--text-muted); font-size:13px;">Description</span>
                            <span style="color:var(--text-muted); font-size:13px; text-align:center;">Date</span>
                            <span style="color:var(--text-muted); font-size:13px; text-align:right;">Amount</span>
                        </div>
                    ` + data.map(i => `
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; padding:12px 0; border-bottom:1px solid var(--border); align-items:center;">
                            <span>${i.description || "No description"}</span>
                            <span style="text-align:center; color:var(--text-muted);">${i.date_received}</span>
                            <span style="text-align:right; color:var(--accent);">+$${i.amount}</span>
                        </div>
                    `).join("")
                })
                .catch(err => console.error("Failed to load income:", err))
            }



            //Add Income
            function addIncome() {
                const amount        = document.getElementById("amount").value
                const date_received = document.getElementById("date_received").value
                const description   = document.getElementById("description").value
                const errorEl       = document.getElementById("error-msg")

                errorEl.style.display = "none"

                if (!amount || !date_received || !description) {
                    errorEl.textContent = "Please fill in all fields."
                    errorEl.style.display = "block"
                    return
                }

                fetch("/income", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ 
                        amount: parseInt(amount), 
                        date_received, 
                        description 
                    })
                })
                .then(r => r.json())
                .then(() => {
                    //this clears form
                    document.getElementById("amount").value = ""
                    document.getElementById("date_received").value = ""
                    document.getElementById("description").value = ""
                    //need to reaload table
                    loadIncome()
                })
                .catch(err => console.error("Failed to add income:", err))
            }
            loadIncome()
        </script>
    </body>
</html>
