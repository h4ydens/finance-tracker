<!DOCTYPE html>
<meta charset="UTF-8">

<html lang="en">
<head>
    <title>DashBoard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <nav>
        <span class="logo">Fintrak</span>
        <a href="dashboard.html" class="active">Dashboard</a>
        <a href="expenses.html">Expenses</a>
        <a href="income.html">Income</a>
    </nav>

    <div class="page">
        <div class="page-title" id="user-name">Loading...</div> <!--add user id here-->
        <div class="page-subtitle">Overview of your finances</div>
        <!-- 4 tabs at the top with the title and total of that user-->
        <div class="grid-4" style="margin-bottom:24px;">
            <div class="card" style="margin-bottom:0;">
                <div class="card-title">Total Income</div>
                <div class="placeholder-block short" id="total-income">Loading...</div>
            </div>
            <div class="card" style="margin-bottom:0;">
                <div class="card-title">Total Expenses</div>
                <div class="placeholder-block short" id="total-expenses">Loading...</div>
            </div>
            <div class="card" style="margin-bottom:0;">
                <div class="card-title">Net Balance</div>
                <div class="placeholder-block short" id="balance">Loading...</div>
            </div>
            <div class="card" style="margin-bottom:0;">
                <div class="card-title">This Month</div>
                <div class="placeholder-block short" id="this-month">Loading...</div>
            </div>
        </div>
        <!--placeholder for graphs-->
        <div class="grid-2">
            <div class="card">
                <div class="card-title">Spending by Category</div>
                <div class="placeholder-block tall">Chart placeholder</div>
            </div>
            <div class="card">
                <div class="card-title">Income vs Expenses Over Time</div>
                <div class="placeholder-block tall">Chart placeholder</div>
            </div>
        </div>
        <!--some more information-->
        <div class="card">
            <div class="card-title">Recent Transactions</div>
            <div class="placeholder-block tall" id="recent-transactions">Loading...</div>
        </div>
    </div>
    <script>
        //get token
        const token = localStorage.getItem("token")

        // if not loged in take to login page
        if(!token){
            window.location.href = "login.html"
        }
        //fastapi looks in the request and grabs the auth token to return the data
        fetch("/dashboard", {headers: {"Authorization": `Bearer ${token}`}})
        //
        .then(r => r.json())
        .then(data => {
            document.getElementById("user-name").textContent = "Welcome, " + data.username
            document.getElementById("total-income").textContent = "$" + data.total_income
            document.getElementById("total-expenses").textContent = "$" + data.total_expenses
            document.getElementById("balance").textContent        = "$" + data.balance
            document.getElementById("this-month").textContent     = "$" + data.this_month

            const container = document.getElementById("recent-transactions")
            if (data.recent_transactions.length === 0) {
                container.textContent = "No transactions yet"
            } 

            //garbage temp method of storing each transaction in a new itteration
            else {
                container.innerHTML = data.recent_transactions.map(t => `
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; padding:12px 0; border-bottom:1px solid var(--border); align-items:center;">
                        <span>${t.description || "No description"}</span>
                        <span style="text-align:center; color:var(--text-muted);">${t.date}</span>
                        <span style="text-align:right; color:#e07070;">-$${t.amount}</span>
                    </div>
                `).join("")
    }
        })
        //throw error if fetch fails
        .catch(err => console.error("Failed to load dashboard:", err))


    </script>
</body>
</html>
