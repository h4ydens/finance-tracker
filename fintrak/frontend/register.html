<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fintrak – Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="center-page">
        <div class="login-box">
            <h2>Create an account</h2>
 
            <div id="error-msg" style="display:none; color:#e07070; font-size:13px; margin-bottom:16px;"></div>
            <div id="success-msg" style="display:none; color:var(--accent); font-size:13px; margin-bottom:16px;"></div>
 
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="hayden123">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
 
            <button class="btn btn-primary" style="width:100%; text-align:center; margin-top:8px;" onclick="register()">
                Create Account
            </button>
 
            <p style="margin-top:16px; font-size:13px; color:var(--text-muted); text-align:center;">
                Already have an account? <a href="login.html" style="color:var(--accent);">Log in</a>
            </p>
        </div>
    </div>
 
    <script>
        async function register() {
            const username = document.getElementById("username").value;
            const email    = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorEl  = document.getElementById("error-msg");
            const successEl = document.getElementById("success-msg");
 
            errorEl.style.display = "none";
            successEl.style.display = "none";
 
            if (!username || !email || !password) {
                errorEl.textContent = "Please fill in all fields.";
                errorEl.style.display = "block";
                return;
            }
 
            const res = await fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, email, password })
            });
 
            const data = await res.json();
 
            if (!res.ok) {
                errorEl.textContent = data.detail || "Something went wrong.";
                errorEl.style.display = "block";
            } else {
                successEl.textContent = "Account created! Redirecting to login...";
                successEl.style.display = "block";
                setTimeout(() => window.location.href = "login.html", 1500);
            }
        }
    </script>
</body>
</html>
