<!DOCTYPE html>
<meta charset="UTF-8">

<html lang="en">
    <head>
        <title>Fintrak - Log In</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="center-page">
            <div class="login-box">
                <h2>Login to Fintrak</h2>
                <div id="error-msg" style="display:none; color:#e07070; font-size:13px; margin-bottom:16px;"></div>
    
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="you@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
    
                <button class="btn btn-primary" style="width:100%; text-align:center; margin-top:8px;" onclick="login()">
                    Log In
                </button>
    
                <p style="margin-top:16px; font-size:13px; color:var(--text-muted); text-align:center;">
                    Don't have an account? <a href="register.html" style="color:var(--accent);">Sign up</a>
                </p>
            </div>
        </div>

        <script>
        async function login() {
            const email    = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const errorEl  = document.getElementById("error-msg");
 
            errorEl.style.display = "none";
 
            const res = await fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });
 
            const data = await res.json();
 
            if (!res.ok) {
                errorEl.textContent = data.detail || "Invalid email or password.";
                errorEl.style.display = "block";
            } else {
                // Save token and username for use across pages
                localStorage.setItem("token", data.token);
                localStorage.setItem("username", data.username);
                window.location.href = "dashboard.html";
            }
        }
        </script>
    </body>
</html>
